<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Code Translator — Octave · Python · Julia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
[data-theme="dark"]{
  --bg:#0a0c12;--bg2:#10131c;--bg3:#181c28;--border:#252a3d;--text:#dde2f5;--muted:#4a5070;--accent:#4ecdc4;
  --oct:#1dbb8a;--oct-bg:#061d14;--oct-bd:#0d4a30;--oct-c:#5df5c0;
  --py:#4a9eff;--py-bg:#050f1f;--py-bd:#0a2a55;--py-c:#7bbfff;
  --jl:#9b8eee;--jl-bg:#0e0c1e;--jl-bd:#2a2360;--jl-c:#c0b8ff;
  --jlp:#f0a030;--jlp-bg:#180e03;--jlp-bd:#4a2e0a;--jlp-c:#ffc870;
  --sp-bg:#131620;--sp-bd:#2e3450;--sp-hov:#1e2235;--sp-txt:#7080b0;
}
[data-theme="light"]{
  --bg:#f0f2fa;--bg2:#e6e9f4;--bg3:#dde1f0;--border:#c5cae0;--text:#1a1e30;--muted:#8090b8;--accent:#0a8a80;
  --oct:#0a7a54;--oct-bg:#d0f5e8;--oct-bd:#80d4b4;--oct-c:#065a3c;
  --py:#1a5caa;--py-bg:#cce0fc;--py-bd:#5090d4;--py-c:#0c3c7a;
  --jl:#4a40a0;--jl-bg:#e0ddf8;--jl-bd:#8880c8;--jl-c:#30288a;
  --jlp:#8a4e00;--jlp-bg:#fbe8bc;--jlp-bd:#d09030;--jlp-c:#6a3a00;
  --sp-bg:#eef0fa;--sp-bd:#c0c8e0;--sp-hov:#e0e4f5;--sp-txt:#5060a0;
}
html,body{height:100%;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{padding:.55rem 1rem;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{font-size:14px;font-weight:700;color:var(--accent);}
.tagline{font-size:10px;color:var(--muted);margin-left:.4rem;}
.hdr-r{display:flex;gap:.5rem;align-items:center;}
#mc{font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg3);border:1px solid var(--border);padding:2px 9px;border-radius:20px;color:var(--muted);transition:all .2s;}
#mc.on{color:var(--accent);border-color:var(--accent);}
.tbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;}
.tbtn:hover{opacity:.7;}

/* HINT BAR */
.hint{padding:.25rem 1rem;border-bottom:1px solid var(--border);background:var(--bg3);font-size:10px;color:var(--muted);flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}

/* MAIN GRID */
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;min-height:0;overflow:hidden;}
.col{display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0;overflow:hidden;position:relative;}
.col:last-child{border-right:none;}

.col-hdr{padding:.4rem .7rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid;}
.col-oct .col-hdr{background:var(--oct-bg);border-color:var(--oct-bd);}
.col-py  .col-hdr{background:var(--py-bg);border-color:var(--py-bd);}
.col-jl  .col-hdr{background:var(--jl-bg);border-color:var(--jl-bd);}
.col-jlp .col-hdr{background:var(--jlp-bg);border-color:var(--jlp-bd);}

.lb{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;}
.col-oct .lb{color:var(--oct);border-color:var(--oct-bd);}
.col-py  .lb{color:var(--py);border-color:var(--py-bd);}
.col-jl  .lb{color:var(--jl);border-color:var(--jl-bd);}
.col-jlp .lb{color:var(--jlp);border-color:var(--jlp-bd);}

.cbtn{font-size:9px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:3px;padding:1px 6px;cursor:pointer;}
.cbtn:hover{color:var(--text);}

/* COLUMN BODY */
.col-body{flex:1;min-height:0;position:relative;overflow:hidden;}
textarea{
  position:absolute;inset:0;width:100%;height:100%;
  background:transparent;color:var(--text);border:none;outline:none;resize:none;
  font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.85;
  padding:.6rem .7rem;caret-color:var(--accent);
}
textarea::placeholder{color:var(--muted);opacity:.38;}
.col-oct textarea:focus{box-shadow:inset 3px 0 0 var(--oct);}
.col-py  textarea:focus{box-shadow:inset 3px 0 0 var(--py);}
.col-jl  textarea:focus{box-shadow:inset 3px 0 0 var(--jl);}
.col-jlp textarea:focus{box-shadow:inset 3px 0 0 var(--jlp);}
.col-oct textarea.out{color:var(--oct-c);}
.col-py  textarea.out{color:var(--py-c);}
.col-jl  textarea.out{color:var(--jl-c);}
.col-jlp textarea.out{color:var(--jlp-c);}

/* SUGGESTION DROPDOWN — floats over the column, anchored below cursor line */
.sp{
  position:absolute;left:0;right:0;bottom:0;
  background:var(--sp-bg);border-top:2px solid var(--accent);
  z-index:200;max-height:60%;overflow-y:auto;
  display:none;
  box-shadow:0 -4px 20px rgba(0,0,0,.4);
}
.sp.open{display:block;}
.sp-hdr{
  padding:.3rem .7rem;font-size:9px;font-weight:700;
  color:var(--accent);text-transform:uppercase;letter-spacing:.7px;
  border-bottom:1px solid var(--sp-bd);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--sp-bg);z-index:1;
}
.sp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;}
.sp-close:hover{color:var(--text);}

.sp-item{
  padding:.42rem .7rem;cursor:pointer;
  border-bottom:1px solid var(--sp-bd);
  display:flex;flex-direction:column;gap:3px;
  transition:background .1s;
}
.sp-item:last-child{border-bottom:none;}
.sp-item:hover,.sp-item.chosen{background:var(--sp-hov);}
.sp-item.chosen{border-left:2px solid var(--accent);padding-left:calc(.7rem - 2px);}

.sp-section{font-size:8.5px;color:var(--sp-txt);text-transform:uppercase;letter-spacing:.5px;}
.sp-op{font-size:10px;color:var(--text);font-weight:600;}
.sp-preview{font-family:'JetBrains Mono',monospace;font-size:11px;white-space:pre;overflow:hidden;text-overflow:ellipsis;}
.col-oct .sp-preview{color:var(--oct-c);}
.col-py  .sp-preview{color:var(--py-c);}
.col-jl  .sp-preview{color:var(--jl-c);}
.col-jlp .sp-preview{color:var(--jlp-c);}

/* STATUS */
.sbar{padding:.25rem 1rem;border-top:1px solid var(--border);background:var(--bg2);font-size:10px;color:var(--muted);flex-shrink:0;display:flex;gap:1.5rem;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <span class="brand">⇄ Live Code Translator</span>
    <span class="tagline">Octave · Python · Julia · Julia+PyPlot — type in any column</span>
  </div>
  <div class="hdr-r">
    <span id="mc">0 matched</span>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
  </div>
</div>
<div class="hint">
  <span id="hintL">Start typing — suggestions appear after 1 character</span>
  <span id="hintR" style="color:var(--accent);font-size:9.5px;"></span>
</div>

<div class="grid">
  <div class="col col-oct">
    <div class="col-hdr">
      <span class="lb">🐙 Octave / MATLAB</span>
      <button class="cbtn" onclick="clearAll()">clear all</button>
    </div>
    <div class="col-body">
      <textarea id="ta-oct" spellcheck="false"
        placeholder="zeros(3,4)&#10;sortrows(a,3)&#10;find(a(:,1)>2)&#10;plot(x,y)&#10;load('f.mat')&#10;iop"></textarea>
    </div>
    <div class="sp" id="sp-oct">
      <div class="sp-hdr"><span>Did you mean?</span><button class="sp-close" onclick="closeSP('oct')">✕</button></div>
      <div id="sp-oct-list"></div>
    </div>
  </div>

  <div class="col col-py">
    <div class="col-hdr"><span class="lb">🐍 Python / NumPy</span></div>
    <div class="col-body">
      <textarea id="ta-py" spellcheck="false" readonly
        placeholder="np.zeros((3,4))&#10;a[a[:,2].argsort()]&#10;id = a[:,0] > 2"></textarea>
    </div>
    <div class="sp" id="sp-py">
      <div class="sp-hdr"><span>Did you mean?</span><button class="sp-close" onclick="closeSP('py')">✕</button></div>
      <div id="sp-py-list"></div>
    </div>
  </div>

  <div class="col col-jl">
    <div class="col-hdr"><span class="lb">🔷 Julia / Plots.jl</span></div>
    <div class="col-body">
      <textarea id="ta-jl" spellcheck="false" readonly
        placeholder="zeros(3,4)&#10;a[sortperm(a[:,3]),:]&#10;id = a[:,1] .> 2"></textarea>
    </div>
    <div class="sp" id="sp-jl">
      <div class="sp-hdr"><span>Did you mean?</span><button class="sp-close" onclick="closeSP('jl')">✕</button></div>
      <div id="sp-jl-list"></div>
    </div>
  </div>

  <div class="col col-jlp">
    <div class="col-hdr"><span class="lb">📊 Julia + PyPlot</span></div>
    <div class="col-body">
      <textarea id="ta-jlp" spellcheck="false" readonly
        placeholder="using PyCall&#10;pyimport(&quot;matplotlib&quot;).use(&quot;Qt5Agg&quot;, force=true)&#10;import PyPlot&#10;plt = pyimport(&quot;matplotlib.pyplot&quot;)&#10;&#10;PyPlot.clf()&#10;PyPlot.close(&quot;all&quot;)&#10;&#10;PyPlot.figure(1, figsize=(10,6))&#10;PyPlot.plot([1,2,3], [1,4,9], &quot;ro&quot;)&#10;display(PyPlot.gcf())&#10;&#10;PyPlot.figure(2, figsize=(10,6))&#10;PyPlot.plot([1,2,3], [4,2,6], &quot;b-&quot;)&#10;display(PyPlot.gcf())&#10;&#10;PyPlot.show()"></textarea>
    </div>
    <div class="sp" id="sp-jlp">
      <div class="sp-hdr"><span>Did you mean?</span><button class="sp-close" onclick="closeSP('jlp')">✕</button></div>
      <div id="sp-jlp-list"></div>
    </div>
  </div>
</div>

<div class="sbar">
  <span id="st1">Waiting...</span>
  <span id="st2"></span>
</div>

// ============================================================
// SEARCH INDEX — prefix-aware
// KWI: exact token → [row indices]
// PREFIX: first 1/2/3 chars → [row indices]  (for instant suggestions)
// ============================================================
const KWI = {};
const PREFIX = {};

function tokenize(str) {
  if (!str) return [];
  const s = new Set();
  for (const m of str.matchAll(/([a-zA-Z_]\w*)\s*[(!]/g)) s.add(m[1].toLowerCase());
  for (const m of str.matchAll(/[a-zA-Z_]\w*/g)) s.add(m[0].toLowerCase());
  return [...s];
}

function addKWI(tok, idx) {
  tok = tok.toLowerCase().trim();
  if (!tok || tok.length < 1) return;
  if (!KWI[tok]) KWI[tok] = [];
  if (!KWI[tok].includes(idx)) KWI[tok].push(idx);
  // Also add prefixes of length 1..min(4,len)
  for (let l = 1; l <= Math.min(4, tok.length); l++) {
    const p = tok.slice(0, l);
    if (!PREFIX[p]) PREFIX[p] = [];
    if (!PREFIX[p].includes(idx)) PREFIX[p].push(idx);
  }
}

DB.forEach((row, idx) => {
  ['oct','py','jl','jlp'].forEach(lang => tokenize(row[lang]).forEach(t => addKWI(t, idx)));
  row.op.toLowerCase().split(/\W+/).forEach(w => { if (w) addKWI(w, idx); });
  row.s.toLowerCase().split(/\W+/).forEach(w => { if (w) addKWI(w, idx); });
  (row.tags || '').toLowerCase().split(/\s+/).forEach(w => { if (w) addKWI(w, idx); });
});

// ============================================================
// FIND CANDIDATES — works from 1 character
// ============================================================
function findCandidates(rawLine, srcLang) {
  const raw = rawLine.trim();
  if (!raw) return [];

  const inputToks = tokenize(raw);
  const rawN = raw.toLowerCase().replace(/\s+/g,'').replace(/[;,]/g,'');
  const scores = {};

  function bump(idx, pts) { scores[idx] = (scores[idx]||0) + pts; }

  // 1. Exact token match
  for (const tok of inputToks) {
    (KWI[tok] || []).forEach(idx => {
      bump(idx, 10);
      const src = (DB[idx][srcLang]||'').toLowerCase();
      if (src.includes(tok)) bump(idx, 12);
      // Extra: function call match
      if (new RegExp(`\\b${tok}\\s*[(!]`).test(src)) bump(idx, 20);
    });
  }

  // 2. Prefix match (for partial typing, 1+ chars)
  for (const tok of inputToks) {
    for (let l = 1; l <= tok.length; l++) {
      const p = tok.slice(0, l);
      if (p.length < 1) continue;
      (PREFIX[p] || []).forEach(idx => {
        const weight = l <= 2 ? 2 : l <= 3 ? 4 : 6;
        bump(idx, weight);
        // Boost if prefix matches something in source language
        const src = (DB[idx][srcLang]||'').toLowerCase();
        if (src.includes(p)) bump(idx, 3);
      });
    }
  }

  // 3. Exact / substring full-line match
  DB.forEach((row, idx) => {
    const c = (row[srcLang]||'').toLowerCase().replace(/\s+/g,'').replace(/[;,]/g,'');
    if (!c) return;
    if (rawN === c)                                     bump(idx, 500);
    else if (rawN.startsWith(c)||c.startsWith(rawN))   bump(idx, 80);
    else if (rawN.includes(c)||c.includes(rawN))       bump(idx, 40);
  });

  return Object.entries(scores)
    .filter(([,s]) => s >= 3)
    .sort(([,a],[,b]) => b-a)
    .map(([i]) => +i);
}

// ============================================================
// UI STATE
// ============================================================
const LANGS  = ['oct','py','jl','jlp'];
const LABELS = {oct:'Octave/MATLAB',py:'Python/NumPy',jl:'Julia/Plots.jl',jlp:'Julia+PyPlot'};
let srcLang = 'oct';
// choices[lineIdx] = DB index chosen for that line
let lineChoices = {};
// candidates per line (last computed)
let lastCandidates = [];
// which line is currently showing suggestions
let activeSuggestLine = -1;

LANGS.forEach(lang => {
  const ta = document.getElementById('ta-' + lang);
  ta.addEventListener('input',  () => doTranslate(lang));
  ta.addEventListener('focus',  () => { if (srcLang !== lang) switchSource(lang); });
  ta.addEventListener('keyup',  (e) => { if (srcLang === lang) onKeyUp(e, lang); });
  ta.addEventListener('click',  () => { if (srcLang === lang) onCursorMove(lang); });
});

function switchSource(lang) {
  srcLang = lang;
  lineChoices = {};
  lastCandidates = [];
  activeSuggestLine = -1;
  LANGS.forEach(l => {
    const ta = document.getElementById('ta-' + l);
    if (l === lang) { ta.removeAttribute('readonly'); ta.classList.remove('out'); }
    else            { ta.setAttribute('readonly',''); ta.classList.add('out'); ta.value = ''; }
    closeSP(l);
  });
}

// Track cursor line to show suggestions for that line
function onCursorMove(lang) {
  const ta = document.getElementById('ta-' + lang);
  const text = ta.value.substring(0, ta.selectionStart);
  const lineIdx = text.split('\n').length - 1;
  showSuggestForLine(lang, lineIdx);
}

function onKeyUp(e, lang) {
  // On arrow up/down navigate suggestions; otherwise update cursor
  const sp = document.getElementById('sp-' + lang);
  if (sp.classList.contains('open')) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') { navigateSP(lang, e.key); return; }
    if (e.key === 'Enter' || e.key === 'Tab') { /* handled elsewhere */ return; }
    if (e.key === 'Escape') { closeSP(lang); return; }
  }
  onCursorMove(lang);
}

// ============================================================
// MAIN TRANSLATE
// ============================================================
function doTranslate(lang) {
  srcLang = lang;
  const srcTa = document.getElementById('ta-' + lang);
  const lines = srcTa.value.split('\n');
  let matched = 0;
  const nonEmpty = lines.filter(l => l.trim()).length;

  lastCandidates = lines.map(line => findCandidates(line, lang));

  // Auto-pick best candidate (don't override existing choice)
  lines.forEach((line, li) => {
    if (!line.trim()) { delete lineChoices[li]; return; }
    const cands = lastCandidates[li];
    if (cands.length > 0) {
      if (lineChoices[li] === undefined || !cands.includes(lineChoices[li]))
        lineChoices[li] = cands[0];
      matched++;
    } else {
      delete lineChoices[li];
    }
  });

  renderOutputCols(lang, lines);
  updateSPForCurrentLine(lang);

  const mc = document.getElementById('mc');
  mc.textContent = `${matched} / ${nonEmpty} matched`;
  mc.className = matched > 0 ? 'on' : '';
  document.getElementById('hintL').textContent =
    `Source: ${LABELS[lang]} · ${matched}/${nonEmpty} lines recognized`;
  document.getElementById('st1').textContent =
    matched > 0 ? `✓ ${matched} line(s) translated` : '⚠ No matches — try: zeros, find, sortrows, iop, load_mat, rcparams...';
  document.getElementById('st2').textContent = `${nonEmpty} lines`;
}

function renderOutputCols(lang, lines) {
  LANGS.forEach(tgt => {
    if (tgt === lang) return;
    const ta = document.getElementById('ta-' + tgt);
    ta.setAttribute('readonly','');
    ta.classList.add('out');
    ta.value = lines.map((line, li) => {
      if (!line.trim()) return '';
      const idx = lineChoices[li];
      if (idx === undefined) return `# ?  no match`;
      const val = DB[idx][tgt];
      if (!val) return `# — N/A`;
      return val;
    }).join('\n');
  });
}

// ============================================================
// SUGGESTION PANEL
// ============================================================
function updateSPForCurrentLine(lang) {
  const ta = document.getElementById('ta-' + lang);
  const text = ta.value.substring(0, ta.selectionStart);
  const lineIdx = text.split('\n').length - 1;
  showSuggestForLine(lang, lineIdx);
}

function showSuggestForLine(lang, lineIdx) {
  const lines = document.getElementById('ta-' + lang).value.split('\n');
  const line = (lines[lineIdx] || '').trim();
  const cands = lastCandidates[lineIdx] || findCandidates(line, lang);

  if (!line || cands.length === 0) { closeSP(lang); return; }

  activeSuggestLine = lineIdx;
  const sp   = document.getElementById('sp-' + lang);
  const list = document.getElementById('sp-' + lang + '-list');
  sp.classList.add('open');
  list.innerHTML = '';

  cands.slice(0, 8).forEach((dbIdx) => {
    const row = DB[dbIdx];
    const item = document.createElement('div');
    item.className = 'sp-item' + (lineChoices[lineIdx] === dbIdx ? ' chosen' : '');
    item.dataset.idx = dbIdx;

    const srcCode = (row[lang] || '—').split('\n')[0];
    item.innerHTML = `
      <div class="sp-section">${escHtml(row.s)}</div>
      <div class="sp-op">${escHtml(row.op)}</div>
      <div class="sp-preview">${escHtml(srcCode)}</div>
    `;

    item.addEventListener('mousedown', (e) => {
      e.preventDefault(); // don't blur textarea
      selectCandidate(lang, lineIdx, dbIdx);
    });

    list.appendChild(item);
  });
}

function selectCandidate(lang, lineIdx, dbIdx) {
  const srcTa = document.getElementById('ta-' + lang);
  const lines = srcTa.value.split('\n');

  // How many lines does the CURRENT entry at lineIdx span?
  // (A previous selection may have inserted multiple lines)
  const prevDbIdx = lineChoices[lineIdx];
  let prevSpan = 1;
  if (prevDbIdx !== undefined) {
    const prevCode = DB[prevDbIdx][lang] || '';
    prevSpan = prevCode.split('\n').length;
  }

  // New content to insert (may be multiline)
  const newCode = DB[dbIdx][lang] || lines[lineIdx];
  const newLines = newCode.split('\n');

  // Replace the old span with the new lines
  lines.splice(lineIdx, prevSpan, ...newLines);
  srcTa.value = lines.join('\n');

  // Update choice — lineIdx is still the anchor line
  lineChoices[lineIdx] = dbIdx;
  // Clear any stale choices that fell inside the old span
  if (prevSpan > 1) {
    for (let i = lineIdx + 1; i < lineIdx + prevSpan; i++) delete lineChoices[i];
  }

  // Recompute output cols from the new source lines
  const newAllLines = srcTa.value.split('\n');
  // Rebuild lastCandidates to match new line count
  lastCandidates = newAllLines.map(line => findCandidates(line, lang));
  renderOutputCols(lang, newAllLines);

  // Refresh panel (mark chosen)
  const list = document.getElementById('sp-' + lang + '-list');
  list.querySelectorAll('.sp-item').forEach(el => {
    el.classList.toggle('chosen', +el.dataset.idx === dbIdx);
  });

  // Update match counter
  const nonEmpty = newAllLines.filter(l => l.trim()).length;
  const matched  = Object.keys(lineChoices).filter(k => lineChoices[k] !== undefined).length;
  document.getElementById('mc').textContent = `${matched} / ${nonEmpty} matched`;
  document.getElementById('mc').className = matched > 0 ? 'on' : '';
}

function navigateSP(lang, key) {
  const list = document.getElementById('sp-' + lang + '-list');
  const items = [...list.querySelectorAll('.sp-item')];
  const cur = items.findIndex(el => el.classList.contains('chosen'));
  let next = key === 'ArrowDown' ? cur + 1 : cur - 1;
  next = Math.max(0, Math.min(items.length - 1, next));
  selectCandidate(lang, activeSuggestLine, +items[next].dataset.idx);
}

function closeSP(lang) {
  document.getElementById('sp-' + lang).classList.remove('open');
  activeSuggestLine = -1;
}

function clearAll() {
  LANGS.forEach(l => {
    const ta = document.getElementById('ta-' + l);
    ta.value = '';
    ta.classList.remove('out');
    if (l !== 'oct') ta.setAttribute('readonly','');
    closeSP(l);
  });
  lineChoices = {};
  lastCandidates = [];
  srcLang = 'oct';
  document.getElementById('mc').textContent = '0 matched';
  document.getElementById('mc').className = '';
  document.getElementById('hintL').textContent = 'Start typing — suggestions appear after 1 character';
  document.getElementById('hintR').textContent = '';
  document.getElementById('st1').textContent = 'Waiting...';
  document.getElementById('st2').textContent = '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleTheme() {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  document.getElementById('themeBtn').textContent = t==='dark'?'☀ Light':'🌙 Dark';
  localStorage.setItem('lct5',t);
}
const sv = localStorage.getItem('lct5');
if (sv) { document.documentElement.dataset.theme=sv; document.getElementById('themeBtn').textContent=sv==='dark'?'☀ Light':'🌙 Dark'; }

// Init: non-oct cols are output-only
LANGS.forEach(l => {
  if (l!=='oct') { document.getElementById('ta-'+l).setAttribute('readonly',''); document.getElementById('ta-'+l).classList.add('out'); }
});
</script>
